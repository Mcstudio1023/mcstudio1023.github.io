<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>HTML Runner | Glass UI</title>
  <!-- Google Fonts + monospace for editor -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: radial-gradient(circle at 20% 30%, rgba(12, 20, 35, 0.96), rgba(5, 10, 20, 0.98)), 
                  repeating-linear-gradient(45deg, rgba(100, 150, 255, 0.02) 0px, rgba(100, 150, 255, 0.02) 2px, transparent 2px, transparent 8px);
      min-height: 100vh;
      padding: 2rem;
    }

    /* main glass container */
    .glass-container {
      max-width: 1400px;
      margin: 0 auto;
      background: rgba(15, 25, 45, 0.4);
      backdrop-filter: blur(16px);
      border-radius: 2.5rem;
      padding: 1.8rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    /* minimal heading */
    .heading {
      margin-bottom: 2rem;
    }
    .heading h1 {
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #ffffff, #b6d0ff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    /* two column layout */
    .runner-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.8rem;
    }

    /* glass panels */
    .glass-panel {
      background: rgba(10, 18, 30, 0.5);
      backdrop-filter: blur(12px);
      border-radius: 1.8rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .panel-header {
      padding: 0.9rem 1.4rem;
      background: rgba(0, 0, 0, 0.25);
      font-size: 0.85rem;
      font-weight: 500;
      color: #d0e2ff;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      letter-spacing: 0.3px;
    }

    /* code editor */
    .code-editor {
      width: 100%;
      flex: 1;
      background: rgba(6, 10, 20, 0.7);
      border: none;
      padding: 1.4rem;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 0.85rem;
      line-height: 1.5;
      color: #eff3ff;
      resize: vertical;
      outline: none;
      min-height: 580px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .code-editor:focus {
      background: rgba(8, 12, 24, 0.9);
      border-left: 2px solid #7c9eff;
    }

    /* right side: buttons + preview */
    .preview-area {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }

    /* button bar — clean glass */
    .button-bar {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      background: rgba(20, 30, 48, 0.6);
      backdrop-filter: blur(8px);
      padding: 0.7rem 1.2rem;
      border-radius: 2rem;
      border: 0.5px solid rgba(255, 255, 255, 0.2);
      align-self: flex-start;
    }
    .glass-btn {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.25);
      padding: 0.5rem 1.2rem;
      border-radius: 2rem;
      font-weight: 500;
      font-size: 0.8rem;
      color: #f0f4ff;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      backdrop-filter: blur(4px);
    }
    .glass-btn-primary {
      background: rgba(80, 130, 255, 0.7);
      border-color: rgba(255, 255, 255, 0.4);
      box-shadow: 0 2px 6px rgba(0, 80, 200, 0.2);
    }
    .glass-btn-primary:hover {
      background: rgba(110, 155, 255, 0.85);
      transform: translateY(-1px);
    }
    .glass-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-1px);
    }

    /* preview iframe */
    .preview-frame {
      width: 100%;
      background: #fff;
      border-radius: 1.2rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      height: 580px;
      display: block;
    }

    /* hidden file input */
    .hidden-input {
      display: none;
    }

    /* responsive */
    @media (max-width: 880px) {
      body {
        padding: 1rem;
      }
      .runner-layout {
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }
      .code-editor, .preview-frame {
        min-height: 420px;
      }
      .button-bar {
        align-self: stretch;
        justify-content: center;
      }
    }

    /* custom scrollbar */
    .code-editor::-webkit-scrollbar {
      width: 6px;
    }
    .code-editor::-webkit-scrollbar-track {
      background: rgba(0,0,0,0.3);
      border-radius: 10px;
    }
    .code-editor::-webkit-scrollbar-thumb {
      background: #6f9eff;
      border-radius: 10px;
    }
    ::selection {
      background: rgba(100, 150, 255, 0.5);
    }
  </style>
</head>
<body>
<div class="glass-container">
  <div class="heading">
    <h1>HTML RUNNER</h1>
  </div>
  <div class="runner-layout">
    <!-- LEFT: Code Editor -->
    <div class="glass-panel">
      <div class="panel-header">
        <span>✎ code editor</span>
      </div>
      <textarea id="codeEditor" class="code-editor" spellcheck="false"></textarea>
    </div>

    <!-- RIGHT: Preview + controls on top -->
    <div class="preview-area">
      <div class="button-bar">
        <button id="runBtn" class="glass-btn glass-btn-primary">▶ Run</button>
        <button id="openBtn" class="glass-btn">📂 Open</button>
        <button id="downloadBtn" class="glass-btn">💾 Download</button>
      </div>
      <iframe id="previewFrame" class="preview-frame" title="live preview" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
    </div>
  </div>
</div>

<!-- hidden file input -->
<input type="file" id="fileInput" class="hidden-input" accept=".html,.htm" />

<script>
  // --------------------------------------------------------------
  //  DEFAULT DEMO – clean and beautiful glassy example
  // --------------------------------------------------------------
  const DEFAULT_HTML = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glassy demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(145deg, #0b1120 0%, #18223c 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }
    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      border-radius: 2rem;
      padding: 2rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 35px rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.2);
    }
    h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #fff, #c0ddff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    p {
      color: rgba(230, 240, 255, 0.85);
      margin: 1rem 0;
    }
    button {
      background: rgba(255,255,255,0.15);
      border: none;
      padding: 0.6rem 1.4rem;
      border-radius: 3rem;
      color: white;
      font-weight: 500;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: 0.2s;
    }
    button:hover {
      background: rgba(255,255,255,0.3);
      transform: scale(0.96);
    }
    .counter {
      margin-top: 1.5rem;
      font-size: 2rem;
      font-weight: 700;
      color: #ffec9f;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>✦ Html runner</h1>
    <p>Edit HTML/CSS/JS on the left → click Run → preview updates instantly.</p>
    <button id="clickBtn">✨ click me</button>
    <div class="counter" id="counterValue">0</div>
    <p style="font-size:0.75rem; margin-top:1rem;">open .html files & download your work</p>
  </div>
  <script>
    let count = 0;
    const btn = document.getElementById('clickBtn');
    const display = document.getElementById('counterValue');
    if(btn) {
      btn.addEventListener('click', () => {
        count++;
        display.innerText = count;
      });
    }
  <\/script>
</body>
</html>`;

  // DOM elements
  const editor = document.getElementById('codeEditor');
  const previewFrame = document.getElementById('previewFrame');
  const runBtn = document.getElementById('runBtn');
  const openBtn = document.getElementById('openBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const fileInput = document.getElementById('fileInput');

  // Blob URL management
  let currentBlobUrl = null;

  // Render preview from given HTML string
  function renderPreview(htmlContent) {
    if (currentBlobUrl) {
      URL.revokeObjectURL(currentBlobUrl);
      currentBlobUrl = null;
    }
    try {
      const blob = new Blob([htmlContent], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      previewFrame.src = url;
      currentBlobUrl = url;
    } catch (err) {
      console.warn(err);
      // fallback error display inside iframe
      const errorBlob = new Blob([`<body style="background:#111;color:#ffaa88;font-family:monospace;padding:2rem;"><h3>⚠️ invalid HTML</h3><pre>${String(err)}</pre></body>`], { type: 'text/html' });
      const errUrl = URL.createObjectURL(errorBlob);
      if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
      previewFrame.src = errUrl;
      currentBlobUrl = errUrl;
    }
  }

  // Run current editor content
  function runCode() {
    const code = editor.value;
    renderPreview(code);
  }

  // Open HTML file from disk
  function openHtmlFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      const content = e.target.result;
      editor.value = content;
      // auto-run after opening for seamless experience (no extra button needed)
      renderPreview(content);
    };
    reader.onerror = () => {
      alert("Error reading file");
    };
    reader.readAsText(file, "UTF-8");
  }

  // Download current editor content as .html
  function downloadHtml() {
    const content = editor.value;
    if (!content.trim()) {
      alert("Nothing to save — editor is empty");
      return;
    }
    const blob = new Blob([content], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'glassy_page.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // Trigger file picker
  function triggerOpen() {
    fileInput.click();
  }

  // Set up event listeners & default content
  function init() {
    // set default demo code
    editor.value = DEFAULT_HTML;
    renderPreview(DEFAULT_HTML);

    // button events
    runBtn.addEventListener('click', runCode);
    openBtn.addEventListener('click', triggerOpen);
    downloadBtn.addEventListener('click', downloadHtml);
    
    // file input change
    fileInput.addEventListener('change', (event) => {
      const file = event.target.files[0];
      if (file) {
        openHtmlFile(file);
      }
      fileInput.value = ''; // allow re-opening same file
    });
  }

  init();
</script>
</body>
</html>
