<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML Creator</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }
    textarea {
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      padding: 12px;
      font-family: monospace;
      font-size: 14px;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }
    .topbar {
      position: fixed;
      top: 10px;
      left: 10px;
      display: flex;
      gap: 10px;
      z-index: 10;
    }
    button {
      padding: 8px 12px;
      border: none;
      cursor: pointer;
      background: #2563eb;
      color: white;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<div class="topbar">
  <button onclick="runCode()">Run</button>
  <button onclick="downloadHTML()">Download</button>
</div>

<textarea id="code"></textarea>
<iframe id="preview"></iframe>

<script>
const defaultCode = `<!DOCTYPE html>
<html>
<head>
  <title>HTML Creator</title>
</head>
<body>
  <h1>Hello World</h1>
</body>
</html>`;

document.getElementById('code').value = defaultCode;

function runCode() {
  const code = document.getElementById('code').value;
  document.getElementById('preview').srcdoc = code;
}

function downloadHTML() {
  const code = document.getElementById('code').value;
  const blob = new Blob([code], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'index.html';
  a.click();
}

runCode();
</script>

</body>
</html>
